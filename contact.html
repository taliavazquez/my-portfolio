<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="Artboard10.png">
  <link rel="shortcut icon" type="image/png" href="Artboard10.png">
  <link rel="apple-touch-icon" href="Artboard10.png">
  <meta name="theme-color" content="#8B3A1A">
  <meta property="og:image" content="Artboard10.png">
  <meta property="og:title" content="Talia Vazquez — Graphic Designer & Illustrator">
  <meta property="og:description" content="Portfolio of Talia Vazquez, a graphic designer and illustrator based in Phoenix, Arizona.">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="Artboard10.png">
  <title>Contact · Talia Vazquez</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;700&display=swap" rel="stylesheet" />

  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --eggplant: #6D3A52;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      color: #522F1D;
      background: #fefaf0;
      overflow-x: hidden;
    }

    h1, h2, h3 { font-family: 'Poppins', sans-serif; font-weight: 700; }

    a { text-decoration: none; color: inherit; }

    /* ── NAV BASE ── */
    .main-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 72px;
      position: sticky;
      top: 0;
      z-index: 1000;
      background: #FAF6EE;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .nav-logo { display: flex; align-items: center; text-decoration: none; flex-shrink: 0; }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 36px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
    .nav-links a {
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: #A07840;
      position: relative;
      padding-bottom: 3px;
      transition: color 0.3s ease;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 1.5px;
      background: currentColor;
      transition: width 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
    .nav-links a.active { font-weight: 700; }
    .nav-right { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
    .resume-btn {
      display: inline-flex;
      align-items: center;
      padding: 10px 22px;
      background: #AE9662;
      color: #FEFAF0;
      border-radius: 6px;
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.25s ease;
    }
    .resume-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: space-between;
      width: 22px; height: 16px;
      background: none; border: none;
      cursor: pointer; padding: 0;
    }
    .hamburger span {
      display: block; width: 100%; height: 2px;
      background: #3a3a3a; border-radius: 2px;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ===== CONTACT ===== */
    #contact {
      background: url('Artboard15.png') center/cover no-repeat;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 48px 80px;
    }
    .contact-inner {
      max-width: 337px;
      width: 100%;
      text-align: center;
      padding-top: 40px;
    }
    .contact-heading {
      font-size: 1.22rem;
      font-weight: 700;
      color: #FFFFFF;
      margin-bottom: 25px;
    }
    .contact-form { text-align: left; }
    .form-row { margin-bottom: 20px; }
    .form-row label {
      display: block;
      font-size: 0.52rem;
      font-weight: 600;
      font-variant: small-caps;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #FFFFFF;
      margin-bottom: 6px;
    }
    .form-row input,
    .form-row textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1.5px solid #FFFFFF;
      padding: 4px 0;
      font-family: 'Poppins', sans-serif;
      font-size: 0.67rem;
      font-weight: 300;
      color: #FFFFFF;
      outline: none;
    }
    .form-row input::placeholder,
    .form-row textarea::placeholder { color: #FFFFFF; opacity: 0.45; }
    .form-row textarea { resize: vertical; min-height: 69px; }
    .btn-submit {
      width: 100%;
      margin-top: 4px;
      padding: 8px;
      background: #a13a1e;
      color: #FEFAF0;
      border: 2px solid #a13a1e;
      border-radius: 6px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.63rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
    }

    /* ===== FOOTER ===== */
    footer {
      background: #FEFAF0;
      color: #522F1D;
      padding: 48px 48px 36px;
      margin-top: 0;
    }
    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
    }
    .footer-brand .footer-name {
      font-family: 'Poppins', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .footer-brand .footer-tagline { font-size: 0.85rem; opacity: 0.65; letter-spacing: 0.3px; }
    .footer-copy {
      max-width: 1100px;
      margin: 28px auto 0;
      padding-top: 20px;
      border-top: 1px solid rgba(82,47,29,0.2);
      font-size: 0.78rem;
      opacity: 0.5;
      text-align: center;
    }

    /* ===== BACK TO TOP ===== */
    .back-to-top {
      position: fixed;
      bottom: 28px; right: 28px;
      width: 46px; height: 46px;
      background: #a13a1e;
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      box-shadow: 0 4px 16px rgba(161,58,30,0.35);
      cursor: pointer;
      border: none;
      z-index: 998;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.2s;
    }
    .back-to-top.visible { opacity: 1; pointer-events: auto; }
    .back-to-top:hover { transform: translateY(-3px); }

    /* ── MOBILE NAV ── */
    @media (max-width: 1024px) {
      .main-nav { padding: 0 24px; }
      .hamburger { display: flex; }
      .resume-btn { display: none; }
      .nav-links {
        position: fixed;
        top: 0; left: unset;
        width: 100vw; height: 100vh;
        background: #FAF6EE;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 40px;
        transform: translateX(-100%);
        transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
        z-index: 998;
      }
      .nav-links.open { transform: translateX(0); }
      .nav-links a {
        font-size: 1.6rem; font-weight: 600; letter-spacing: 1px;
        opacity: 0; transform: translateY(16px);
        transition: opacity 0.35s ease, transform 0.35s ease, color 0.2s ease;
      }
      .nav-links.open a:nth-child(1) { opacity: 1; transform: none; transition-delay: 0.15s; }
      .nav-links.open a:nth-child(2) { opacity: 1; transform: none; transition-delay: 0.2s; }
      .nav-links.open a:nth-child(3) { opacity: 1; transform: none; transition-delay: 0.25s; }
      .nav-links.open a:nth-child(4) { opacity: 1; transform: none; transition-delay: 0.3s; }
      .nav-links.open a:nth-child(5) { opacity: 1; transform: none; transition-delay: 0.35s; }
      .nav-links a::after { display: none; }
      .main-nav { z-index: 999; }
    }
    @media (min-width: 1025px) {
      .hamburger { display: none !important; }
      .nav-links {
        display: flex !important;
        position: absolute !important;
        transform: translateX(-50%) !important;
        flex-direction: row !important;
        height: auto !important; width: auto !important;
        background: transparent !important;
        gap: 36px !important;
      }
      .resume-btn { display: inline-flex !important; }
    }
    .nav-close { display: none; }
    @media (max-width: 1024px) {
      .nav-close {
        display: block;
        position: absolute;
        top: 24px;
        right: 24px;
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: #3a3a3a;
        line-height: 1;
        z-index: 1000;
      }
      .main-nav { overflow: visible; }
      .nav-links {
        left: 0 !important;
        right: 0 !important;
        width: 100vw !important;
        max-width: 100vw !important;
        transform: translateX(-100vw) !important;
      }
      .nav-links.open { transform: translateX(0) !important; }
    }

    /* ===== PREMIUM ANIMATIONS ===== */
    .reveal {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1), transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .reveal-stagger > * {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1), transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .reveal-stagger.visible > *:nth-child(1) { transition-delay: 0s; opacity: 1; transform: none; }
    .reveal-stagger.visible > *:nth-child(2) { transition-delay: 0.1s; opacity: 1; transform: none; }
    .reveal-stagger.visible > *:nth-child(3) { transition-delay: 0.2s; opacity: 1; transform: none; }
    .reveal-stagger.visible > *:nth-child(4) { transition-delay: 0.3s; opacity: 1; transform: none; }
    .reveal-stagger.visible > *:nth-child(5) { transition-delay: 0.4s; opacity: 1; transform: none; }
    .reveal-stagger.visible > *:nth-child(6) { transition-delay: 0.5s; opacity: 1; transform: none; }
    img {
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.4s ease;
    }
    img:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    }
    a {
      position: relative;
    }
    body {
      animation: pageFadeIn 0.6s ease forwards;
    }
    @keyframes pageFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    html { scroll-behavior: smooth; }


    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      nav { padding: 18px 24px; }
      .nav-links { gap: 22px; }
      #contact { padding: 100px 24px 60px; }
      footer { padding: 40px 24px 28px; }
      .footer-inner { align-items: center; }
    }
    @media (max-width: 560px) {
      nav { padding: 16px 20px; }
      .nav-links { gap: 16px; }
      .nav-hire { padding: 7px 16px; font-size: 0.78rem; }
    }
    /* ===== BUTTON HOVER STATES ===== */
    a[class*="btn"], button, .cta, [class*="button"], .nav-hire {
      transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.25s ease, background 0.25s ease, color 0.25s ease !important;
    }
    a[class*="btn"]:hover, button:hover, .cta:hover, [class*="button"]:hover, .nav-hire:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }
    a[class*="btn"]:active, button:active, .cta:active, [class*="button"]:active, .nav-hire:active {
      transform: translateY(0px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* ===== FOOTER ENHANCEMENTS ===== */
    footer { padding: 60px 80px !important; }
    .footer-brand > a { margin-bottom: 16px !important; }
    .footer-tagline { margin-top: 16px !important; }
    .footer-links {
      display: flex;
      gap: 20px;
      margin-top: 8px;
    }
    .footer-links a {
      font-size: 0.85rem;
      opacity: 0.65;
      transition: opacity 0.2s;
    }
    .footer-links a:hover { opacity: 1; }
    @media (max-width: 768px) {
      footer {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 12px;
        padding: 40px 24px !important;
      }
      footer .footer-links, footer nav, footer ul {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      footer a, footer p, footer span {
        display: block;
        text-align: center;
      }
    }
    /* ===== GLOBAL RESPONSIVE ===== */
    html, body { overflow-x: hidden !important; max-width: 100% !important; }
    @media (max-width: 1024px) {
      section, .section-inner, .overview-inner, .emails-inner, .process-inner {
        padding: 40px 24px !important;
        width: 100% !important;
        max-width: 100% !important;
      }
      .emails-grid, .process-grid, .five-col-images, [style*="grid-template-columns"] {
        grid-template-columns: 1fr 1fr !important;
      }
      img { max-width: 100% !important; height: auto; }
      h1, h2, h3 { font-size: clamp(1.6rem, 6vw, 3rem) !important; white-space: normal !important; }
      p { font-size: clamp(0.9rem, 2.5vw, 1.1rem) !important; }
    }
    @media (max-width: 768px) {
      .emails-grid, .process-grid, [style*="grid-template-columns: repeat(3"] {
        grid-template-columns: 1fr !important;
      }
      .overview-cols, .cols, [style*="grid-template-columns: 1fr 1fr"] {
        grid-template-columns: 1fr !important;
      }
      .project-cards, .cards-grid {
        grid-template-columns: 1fr !important;
      }
      .btn-group, [style*="display:flex"][style*="gap"] {
        flex-direction: column !important;
        align-items: flex-start !important;
      }
    }
  </style>
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="main-nav">
    <a href="index.html" class="nav-logo">
      <img src="Artboard10.png" alt="Talia Vazquez" style="height:48px; width:auto;">
    </a>
    <div class="nav-links" id="nav-links">
      <button class="nav-close" id="nav-close" aria-label="Close menu">✕</button>
      <a href="index.html" class="nav-link">Home</a>
      <a href="work.html" class="nav-link">Graphic Design</a>
      <a href="illustration.html" class="nav-link">Illustration</a>
      <a href="about.html" class="nav-link">About</a>
      <a href="contact.html" class="nav-link">Contact</a>
    </div>
    <div class="nav-right">
      <a href="https://drive.google.com/file/d/1BVcCVkNNuXcY_24XeNwy87yWmKQnrnGC/view?usp=drive_link" target="_blank" class="resume-btn">Resume</a>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- ===== CONTACT ===== -->
  <section id="contact" class="reveal">
    <div class="contact-inner">
      <h2 class="contact-heading">Contact Me</h2>
      <form class="contact-form" onsubmit="handleSubmit(event)">
        <div class="form-row">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Jane Smith" required />
        </div>
        <div class="form-row">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="jane@example.com" required />
        </div>
        <div class="form-row">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Say hello..." required></textarea>
        </div>
        <button type="submit" class="btn-submit">Send Message</button>
      </form>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer>
    <div class="footer-inner">
      <div class="footer-brand">
        <a href="index.html" style="display:block;margin:0 auto 4px;text-align:center;"><img src="Artboard10.png" alt="Talia Vazquez" style="height:60px;display:block;margin:0 auto;"></a>
        <div class="footer-tagline">Graphic Designer &amp; Illustrator · Phoenix, AZ</div>
      </div>
      <div class="footer-links">
        <a href="https://www.linkedin.com/in/talia-vazquez-75191a212/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      </div>
    </div>
    <div class="footer-copy">
      © 2026 Talia Vazquez
    </div>
  </footer>

  <button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top">↑</button>

  <script>
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('nav-links');
    if (hamburger && navLinks) {
      hamburger.addEventListener('click', function() {
        hamburger.classList.toggle('open');
        navLinks.classList.toggle('open');
        document.body.style.overflow = navLinks.classList.contains('open') ? 'hidden' : '';
      });
      navLinks.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', function() {
          hamburger.classList.remove('open');
          navLinks.classList.remove('open');
          document.body.style.overflow = '';
        });
      });
      const navClose = document.getElementById('nav-close');
      if (navClose) {
        navClose.addEventListener('click', function() {
          hamburger.classList.remove('open');
          navLinks.classList.remove('open');
          document.body.style.overflow = '';
        });
      }
    }

    const btn = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
      btn.classList.toggle('visible', window.scrollY > 400);
    });

    const reveals = document.querySelectorAll('.reveal, .reveal-stagger');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.12 });
    reveals.forEach(el => observer.observe(el));

    function handleSubmit(e) {
      e.preventDefault();
      const b = e.target.querySelector('.btn-submit');
      b.textContent = 'Sent!';
      setTimeout(() => {
        b.textContent = 'Send Message';
        e.target.reset();
      }, 3000);
    }
  </script>
  <script src="nav.js"></script>

</body>
</html>
